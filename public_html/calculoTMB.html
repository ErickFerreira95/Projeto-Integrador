<html>
    <head>
        <title>Cálculo TMB</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
        <link href="calculoTMB.css" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Tabela nutricional</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="#">Cadastro de alimentos</a>
                        <a class="nav-link" href="#">Cálculo TMB</a>
                    </div>
                </div>
            </div>
        </nav>
        <div class="container d-flex justify-content-center align-items-center" >
            <div class="row">
                <div class="col">
                    <form>
                        <h3>Insira suas informações:</h3>
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">Peso(kg):</label>
                            <input type="text" class="form-control" id="nomeAlimento">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Altura(cm):</label>
                            <input type="text" class="form-control" id="proteina">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Idade:</label>
                            <input type="text" class="form-control" id="carboidrato">
                        </div>
                        <div class="mb-3">
                            <select class="form-select" aria-label="Default select example">
                                <option disabled="" selected>Selecione</option>
                                <option value="1">Sedentário</option>
                                <option value="2">Levemente ativo</option>
                                <option value="3">Ativo</option>
                                <option value="4">Muito ativo</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Calcular</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    </body>
</html>
