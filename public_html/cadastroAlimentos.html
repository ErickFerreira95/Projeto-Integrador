<html>
    <head>
        <title>Cadastro de alimentos</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
        <link href="cadastroAlimentos.css" rel="stylesheet">
    </head>
    <body>
        <nav id="menu" class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="paginaInicial.html">Tabela nutricional</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="cadastroAlimentos.html">Cadastro de alimentos</a>
                        <a class="nav-link" href="calculoTMB.html">Cálculo TMB</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container d-flex justify-content-center align-items-center" >
            <div class="row">
                <div class="col">
                    <form>
                        <h3>Insira as informações:</h3>
                        <p>As quantidades devem ser para 100g do alimento.</p>
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">Nome do alimento:</label>
                            <input type="text" class="form-control" id="nomeAlimento">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Proteína</label>
                            <input type="text" class="form-control" id="proteina">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Carboidrato:</label>
                            <input type="text" class="form-control" id="carboidrato">
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">Gordura:</label>
                            <input type="text" class="form-control" id="gordura">
                        </div>
                        <button id="botao" type="submit" class="btn btn-primary">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    </body>
</html>
